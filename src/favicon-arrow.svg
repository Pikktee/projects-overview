<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Henrik Heil Portfolio">
  <style>
    .bg { fill: #0f1114; }
    .arrow { fill: none; stroke: #e8c88a; }
