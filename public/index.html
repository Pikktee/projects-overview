<!DOCTYPE html>

  <meta name="description" content="Portfolio von Henrik Heil — Webprojekte, Tech-Stacks und Live-Demos: Patina, Velosia, hugur und mehr." />
  <title>Portfolio · Henrik Heil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="hero">
    <p class="hero__eyebrow">Henrik Heil</p>
    <h1 class="hero__title">Portfolio &amp; <em>Projekte</em></h1>
    <p class="hero__lead">Aktuelle Web-Apps, KI-Tools und Experimente</p>
  </header>

  <main class="sections" id="projects">
  <section class="section">
    
    <div class="grid">
    <article class="card" style="--accent:#8b6f47" data-slug="patina" data-stack="next.js,react,typescript,sqlite,drizzle orm,docker,vitest,railway">
      <button type="button" class="card__btn" aria-haspopup="dialog" aria-controls="project-drawer" aria-expanded="false" data-open="patina">
        <div class="card__media"><img src="/screenshots/patina.png" alt="" loading="lazy" width="640" height="400" /></div>
        <div class="card__body">
          <h2 class="card__title">Patina</h2>
          <p class="card__desc">Prüft historische Romane auf Anachronismen — mit DWDS-Belegen und eigener Entscheidung am Ende.</p>
          <span class="card__cta">Details ansehen <span aria-hidden="true">→</span></span>
        </div>
      </button>
    </article>

    <article class="card" style="--accent:#3d8bfd" data-slug="velosia" data-stack="react,vite,python,fastapi,chrome extension,android">
      <button type="button" class="card__btn" aria-haspopup="dialog" aria-controls="project-drawer" aria-expanded="false" data-open="velosia">
        <div class="card__media"><img src="/screenshots/velosia.png" alt="" loading="lazy" width="640" height="400" /></div>
        <div class="card__body">
          <h2 class="card__title">Velosia</h2>
          <p class="card__desc">Foto genügt: KI erstellt Anzeigen und füllt Kleinanzeigen und Vinted per App oder Erweiterung aus.</p>
          <span class="card__cta">Details ansehen <span aria-hidden="true">→</span></span>
        </div>
      </button>
    </article>

    <article class="card" style="--accent:#e07a2f" data-slug="schnappster" data-stack="next.js,react,typescript,python,tailwind css,docker,chrome extension,radix ui">
      <button type="button" class="card__btn" aria-haspopup="dialog" aria-controls="project-drawer" aria-expanded="false" data-open="schnappster">
        <div class="card__media"><img src="/screenshots/schnappster.png" alt="" loading="lazy" width="640" height="400" /></div>
        <div class="card__body">
          <h2 class="card__title">Schnappster</h2>
          <p class="card__desc">Überwacht Kleinanzeigen-Suchen, bewertet neue Inserate per KI und meldet echte Schnäppchen.</p>
          <span class="card__cta">Details ansehen <span aria-hidden="true">→</span></span>
        </div>
      </button>
    </article>

    <article class="card" style="--accent:#5c8a72" data-slug="hugur" data-stack="react,vite,typescript,express,tailwind css,postgresql,supabase,docker,chrome extension,android,railway,gsap,tiptap">
      <button type="button" class="card__btn" aria-haspopup="dialog" aria-controls="project-drawer" aria-expanded="false" data-open="hugur">

        <div class="card__body">
          <h2 class="card__title">hugur</h2>
          <p class="card__desc">Notizen, Links und Ideen in einem durchsuchbaren Stream — im Browser, per Erweiterung und auf Android.</p>
          <span class="card__cta">Details ansehen <span aria-hidden="true">→</span></span>
        </div>
      </button>
    </article>

    <article class="card" style="--accent:#c45c8a" data-slug="tile-weave" data-stack="react,vite,typescript,express,three.js">
      <button type="button" class="card__btn" aria-haspopup="dialog" aria-controls="project-drawer" aria-expanded="false" data-open="tile-weave">

        <div class="card__body">
          <h2 class="card__title">Tile Weave</h2>
          <p class="card__desc">KI-Stoffmuster erzeugen, nahtlos prüfen und in 3D direkt am Kleid betrachten.</p>
          <span class="card__cta">Details ansehen <span aria-hidden="true">→</span></span>
        </div>
      </button>
    </article>

    <article class="card" style="--accent:#f4b942" data-slug="suntino" data-stack="express,chrome extension,railway">
      <button type="button" class="card__btn" aria-haspopup="dialog" aria-controls="project-drawer" aria-expanded="false" data-open="suntino">

        <div class="card__body">
          <h2 class="card__title">Suntino</h2>

          <span class="card__cta">Details ansehen <span aria-hidden="true">→</span></span>
        </div>
      </button>

      <button type="button" class="card__btn" aria-haspopup="dialog" aria-controls="project-drawer" aria-expanded="false" data-open="patina-kampagne">
        <div class="card__media"><img src="/screenshots/patina-kampagne.png" alt="" loading="lazy" width="640" height="400" /></div>
